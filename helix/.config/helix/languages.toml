# Rust
[[language]]
name = "rust"
auto-format = true
language-servers = ["typos", "rust-analyzer"]

roots = [
  "Cargo.toml",
  "Cargo.lock"
]

indent = { tab-width = 4, unit = " " }

[language.debugger]
command = "probe-rs"
name = "probe-rs"
args = ["dap-server", "--log-file=/home/aa/zero-to-async/ch6_async_await/log.log", "--single-session"]
port-arg = "--port {}"
transport = "tcp"

[[language.debugger.templates]]
name = "binary"
request = "launch"

[[language.debugger.templates.completion]]
completion = "filename"
name = "binary"

[language.debugger.templates.args]
runInTerminal = true


[[language]]
name = "markdown"
language-servers = ["typos", "marksman"]
soft-wrap.wrap-indicator = ""

[[language]]
name = "cpp"
formatter = { command = "clang-format" }
language-servers = ["typos", "clangd"]
roots = ["CMakeLists.txt"]
auto-format = true
indent = { tab-width = 4, unit = " " }

[language.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
'`' = '`'

[[language]]
name = "c"
formatter = { command = "clang-format" }
language-servers = ["typos", "clangd"]
roots = ["CMakeLists.txt"]
auto-format = true
indent = { tab-width = 4, unit = " " }

[language.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
'`' = '`'


[[language]]
name = "protobuf"
language-servers = ["typos"]

[[language]]
name = "json"
language-servers = ["typos"]


[[language]]
name = "nix"
auto-format = true
language-servers = ["typos", "nixd"]

[language-server.rust-analyzer]
command = "rust-analyzer"

[language-server.rust-analyzer.config]
diagnostics.experimental.enable = true

[language-server.typos]
command = "typos-lsp"
environment = {"RUST_LOG" = "error"}
config.diagnosticSeverity = "Warning"

[language-server.clangd]
command = "clangd"

[language-server.marksman]
command = "marksman"

[language-server.nixd]
command = "nixd"

[language-server.nixd.config.nixd.formatting]
command = ["nixfmt"]

[language-server.nixd.config.nixd.nixpkgs]
expr = "import (builtins.getFlake \"/etc/nixos\").inputs.nixpkgs { }"

[language-server.nixd.config.nixd.options.nixos]
expr = "(builtins.getFlake \"/etc/nixos\").nixosConfigurations.xps.options"

[language-server.nixd.config.nixd.options.home-manager]
expr = "(builtins.getFlake \"/etc/nixos\").homeConfigurations.archie.options"
